  <body style="margin: 0;padding: 0;overflow: hidden;">
    <div id="map" style="position:absolute;width:100%;height:100%" ></div>

    <div id="homeButton" style="position: absolute;top:60px;left:9px;width:21px;height:21px;background-color:#f0f0f0;border-radius:3px;border:1px solid #cccccc;cursor:pointer">
      <img  style="position:absolute;left:3px;top:3px;width:15px;height:15px"  src="./image/Home.png">
    </div>

    <div id="nameButton" style="position: absolute;top:85px;left:9px;width:21px;height:21px;background-color:#f0f0f0;border-radius:3px;border:1px solid #cccccc;cursor:pointer">
      <img  id="nameButtonimg" style="position:absolute;left:3px;top:4px;width:15px;height:13px"  src="./image/name.png">
    </div>


    <div class="loding_div" id="loadingModal" style="display: none">
        <div id="loadingText">
            3D 데이터를 불러오는 중입니다...
        </div>
        <div id="loadingText2" style="display: none;">
            10%
        </div>

        <div class="sk-circle">
            <div class="sk-circle1 sk-child"></div>
            <div class="sk-circle2 sk-child"></div>
            <div class="sk-circle3 sk-child"></div>
            <div class="sk-circle4 sk-child"></div>
            <div class="sk-circle5 sk-child"></div>
            <div class="sk-circle6 sk-child"></div>
            <div class="sk-circle7 sk-child"></div>
            <div class="sk-circle8 sk-child"></div>
            <div class="sk-circle9 sk-child"></div>
            <div class="sk-circle10 sk-child"></div>
            <div class="sk-circle11 sk-child"></div>
            <div class="sk-circle12 sk-child"></div>
        </div>
    </div>


    <div class="toggle-buttons" id="viewToggle" style="position: absolute;right: 10px;top: 10px;">
    <div class="toggle-indicator" id="indicator" style="left: 63px;"></div>
    <button class="toggle-button" data-view="map">일반지도</button>
    <button class="toggle-button active" data-view="sky">위성지도</button>
  </div>


<div style="position: absolute;right: 10px;top: 50px;font-size:14px;color:black;font-weight:600">심도 : <span id="depthtext">0.00m</span></div>




  
  <ul id="context-menu" style="
    position: absolute;
    display: none;
    list-style: none;
    padding: 5px 0;
    margin: 0;
    background: #fff;
    border: 1px solid #ccc;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
    z-index: 1000;
">
  <li id="rename" class="rbutton" style="padding: 5px 20px; cursor: pointer;">마커 이름 변경</li>
  <li id="delete" class="rbutton" style="padding: 5px 20px; cursor: pointer;">마커 삭제</li>
</ul>


<ul id="context-menu2" style="
    position: absolute;
    display: none;
    list-style: none;
    padding: 5px 0;
    margin: 0;
    background: #fff;
    border: 1px solid #ccc;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
    z-index: 1000;
">
  <li id="rename2" class="rbutton" style="padding: 5px 20px; cursor: pointer;">관로 이름 변경</li>
  <li id="delete2" class="rbutton" style="padding: 5px 20px; cursor: pointer;">관로 삭제</li>
</ul>



<ul id="context-menu3" style="
    position: absolute;
    display: none;

    padding: 5px 0;

    background: #fff;
    border: 1px solid #ccc;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
    z-index: 1000;
">
  <li id="create_marker" class="rbutton" style="padding: 5px 20px; cursor: pointer;">마커 생성</li>
  <li id="check_dist" class="rbutton" style="padding: 5px 20px; cursor: pointer;">측선 거리 조회</li>
</ul>



  <div id="addressBox" style="position: absolute;background-color: #ffffff;border: 1px solid #000000;padding:5px;display: none;z-index: 1000;">
    <span id="addressBoxText" style="padding:8px">
    </span>
    <img id="addressBox_close" style="position: absolute;cursor: pointer;width: 10px;height: 10px;top: 1px;right: 1px;" src="image/Cancel Bold.png">
  </div>


  <div id="DistanceBox" style="position: absolute;background-color: #ffffff;border: 1px solid #000000;padding:5px;display: none;z-index: 1000;">
    <span id="DistanceBoxText" style="padding:8px">
    </span>
    <img id="DistanceBox_close" style="position: absolute;cursor: pointer;width: 10px;height: 10px;top: 1px;right: 1px;" src="image/Cancel Bold.png">
  </div>
